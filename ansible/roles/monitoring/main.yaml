- name: Cài đặt Node Exporter từ kho Apt
  apt:
    name: prometheus-node-exporter
    state: present

- name: Đẩy file cấu hình Promtail từ Template
  template:
    src: promtail-config.yml.j2
    dest: /etc/promtail-config.yml

- name: Khởi động dịch vụ Promtail
  systemd:
    name: promtail
    state: started
    enabled: yes
