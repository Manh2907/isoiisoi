global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.0.22:9100', '10.0.0.11:9100']
  - job_name: "management-cluster"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          hostname: 'Management-VM'
          service: 'Prometheus'
      - targets: ["alertmanager:9093"]
        labels:
          hostname: 'Management-VM'
          service: 'Alertmanager'
      - targets: ["grafana:3000"]
        labels:
          hostname: 'Management-VM'
          service: 'Grafana'
