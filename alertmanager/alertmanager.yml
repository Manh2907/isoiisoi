global:
  resolve_timeout: 1m

route:
  receiver: "telegram-test"
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1m

  routes:
    - match:
        severity: warning
      receiver: "telegram-warning"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1m

    - match:
        severity: error
      receiver: "telegram-alert"
      group_wait: 20s
      group_interval: 2m
      repeat_interval: 1h

    - match:
        severity: critical
      receiver: "telegram-alert"
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 1m

# CHỈ HỖ TRỢ TEMPLATE FILE – không hỗ trợ schedule/time intervals
templates:
  - "/etc/alertmanager/template.tmpl"

receivers:
  # EMAIL RECEIVER
  - name: "email"
    email_configs:
      - to: "example@gmail.com"
        from: "example@gmail.com"
        smarthost: "smtp.gmail.com:587"
        auth_username: "example@gmail.com"
        auth_identity: "example@gmail.com"
        auth_secret: "<your_secret>"
        send_resolved: true

  # TELEGRAM RECEIVERS
  - name: "telegram-test"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: 
        bot_token: 
        send_resolved: true
        parse_mode: "HTML"

  - name: "telegram-warning"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: 
        bot_token: 
        send_resolved: true
        parse_mode: "HTML"

  - name: "telegram-alert"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: 
        bot_token: 
        send_resolved: true
        parse_mode: "HTML"

  # WEBHOOK RECEIVER (BẠN TỰ CÓ API)
  - name: "webhook"
    webhook_configs:
      - url: "http://api.my-alert.com/alert/7204342151"
        send_resolved: true

# INHIBIT RULES (GIỮ NGUYÊN)
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["zone"]

  - source_match:
      severity: "critical"
    target_match:
      severity: "error"
    equal: ["zone"]
